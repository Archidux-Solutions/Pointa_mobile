<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Pointa Profil Mockup</title>
  <link rel="stylesheet" href="pointa-mockups.css">
</head>
<body>
  <main class="phone">
    <div class="safe">
      <div class="topbar">
        <div class="back">‹</div>
        <h1 class="title" style="margin-right:auto; margin-left:14px;">Profil</h1>
      </div>

      <section class="card profile-card">
        <div class="profile-avatar"></div>
        <div class="profile-name">Abdoul Sinon</div>
        <div class="subtitle">Agent operations</div>
        <div class="ghost-btn">Modifier le profil</div>
      </section>

      <section class="card section" style="margin-top:16px;">
        <div class="section-title">
          <h3>Informations</h3>
        </div>
        <div class="info-list">
          <div class="info-row">
            <div class="icon-badge blue">I</div>
            <div class="info-text"><strong>Matricule</strong><span>EMP-2026-1847</span></div>
          </div>
          <div class="info-row">
            <div class="icon-badge blue">E</div>
            <div class="info-text"><strong>Email</strong><span>abdoul.sinon@pointa.app</span></div>
          </div>
          <div class="info-row">
            <div class="icon-badge blue">D</div>
            <div class="info-text"><strong>Departement</strong><span>Operations</span></div>
          </div>
          <div class="info-row">
            <div class="icon-badge blue">T</div>
            <div class="info-text"><strong>Telephone</strong><span>+226 00 00 00 00</span></div>
          </div>
          <div class="info-row">
            <div class="icon-badge blue">S</div>
            <div class="info-text"><strong>Site principal</strong><span>Siege Ouaga</span></div>
          </div>
        </div>
      </section>
    </div>

    <nav class="bottom-nav">
      <div class="item">Accueil</div>
      <div class="item">Presence</div>
      <div class="item">Historique</div>
      <div class="item">Recap</div>
      <div class="item active">Profil</div>
    </nav>
  </main>
</body>
</html>
